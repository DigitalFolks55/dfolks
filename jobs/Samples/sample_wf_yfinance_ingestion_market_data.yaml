kind: DataIngestionYFinanceMarketData

corp_codes:  # Must have
 - "^N225"  # Nikkei 225
 - "^GSPC"  # S&P 500
 - "CL=F"  # Crude Oil WTI
 - "GC=F"  # Gold
 - "USDJPY=X"  # USD/JPY exchange rate
period: "1mo"  # Not able to set up this if start_date or end_date is defined
inverval: "1d"  # Not able to set up this if start_date or end_date is defined
start_date: "2024-12-01"  # Not able to set up this if period or interval is defined
end_date: "2025-12-10"  # Not able to set up this if period or interval is defined
format: "df"  # df, csv, parquet
target_db: "yf_data"  # If you want to store data into a specific root folder
target_path_market_data: "jp_market_data.csv"  # File or table name
write_mode: "upsert"  # overwrite, incremental, upsert, append, archive
schema_market_data: "file://src/dfolks/schema/schema_yfinance_stock_price.yaml"  # Output dataframe schema
